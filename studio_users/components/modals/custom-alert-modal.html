     File: components/modals/custom-alert-modal.html
     ================================================ -->
<div id="customAlertModal" class="cam-overlay" role="dialog" aria-modal="true" aria-labelledby="camTitle">
    <div class="cam-card">
        <!-- Icon & Content Container -->
        <div class="cam-body">
            <div class="cam-icon" id="camIconWrapper">
                <i class="fa-solid fa-circle-exclamation" id="camIcon"></i>
            </div>
            <div class="cam-text">
                <h3 class="cam-title" id="camTitle">Alert</h3>
                <p class="cam-message" id="camMessage">Message goes here.</p>
            </div>
        </div>
        
        <!-- Footer / Actions -->
        <div class="cam-footer">
            <button class="cam-btn" id="camOkBtn">OK</button>
        </div>
    </div>
</div>
