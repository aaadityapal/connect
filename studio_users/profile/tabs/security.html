            <section class="card section-security" style="padding: 2.5rem; border-radius: 16px; border: 1px solid #f1f5f9;">
                <div style="margin-bottom: 2.5rem;">
                    <h2 class="section-title" style="border: none; padding: 0; margin-bottom: 0.5rem; font-size: 1.25rem; font-weight: 700; color: #0f172a; letter-spacing: -0.02em;">Security Settings</h2>
                    <p style="color: #64748b; font-size: 0.9rem;">Maintain account security by managing your credentials.</p>
                </div>

                <form id="changePasswordForm" class="form-grid grid-3" style="gap: 2rem;">
                    <div class="form-group" style="margin: 0; position: relative;">
                        <label style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block;">Current Password</label>
                        <div style="position: relative;">
                            <input type="password" id="currentPassword" placeholder="••••••••" required 
                                   style="width: 100%; padding: 12px 30px 12px 0; background: transparent; border: none; border-bottom: 1.5px solid #e2e8f0; border-radius: 0; font-size: 1rem; color: #1e293b; outline: none; transition: border-color 0.2s ease;">
                            <button type="button" class="toggle-password" style="position: absolute; right: 0; top: 12px; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0;">👁️</button>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; grid-column: span 2;">
                        <div class="form-group" style="margin: 0; position: relative;">
                            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
                                <label style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin: 0; display: block;">New Password</label>
                                <button type="button" onclick="generateStrongPassword()" style="background: none; border: none; font-size: 0.7rem; color: #3b82f6; cursor: pointer; font-weight: 600; padding: 0;">Generate Strong</button>
                            </div>
                            <div style="position: relative;">
                                <input type="password" id="newPassword" placeholder="••••••••" required 
                                       style="width: 100%; padding: 12px 30px 12px 0; background: transparent; border: none; border-bottom: 1.5px solid #e2e8f0; border-radius: 0; font-size: 1rem; color: #1e293b; outline: none; transition: border-color 0.2s ease;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 0; top: 12px; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0;">👁️</button>
                            </div>
                            <p style="font-size: 0.65rem; color: #94a3b8; margin-top: 6px;">Min. 8 chars, 1 capital, 1 number</p>
                        </div>
                        <div class="form-group" style="margin: 0; position: relative;">
                            <label style="font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block;">Confirm Password</label>
                            <div style="position: relative;">
                                <input type="password" id="confirmPassword" placeholder="••••••••" required 
                                       style="width: 100%; padding: 12px 30px 12px 0; background: transparent; border: none; border-bottom: 1.5px solid #e2e8f0; border-radius: 0; font-size: 1rem; color: #1e293b; outline: none; transition: border-color 0.2s ease;">
                                <button type="button" class="toggle-password" style="position: absolute; right: 0; top: 12px; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0;">👁️</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions mt-4" style="grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                        <p style="margin: 0; font-size: 0.85rem; color: #94a3b8;">Forgot your password? <button type="button" id="ag-trigger-password-reset" style="background:none; border:none; color: #3b82f6; font-weight: 600; text-decoration: none; cursor:pointer; padding:0;">Reset Password</button></p>
                        <button type="submit" class="btn btn-primary" id="changePasswordBtn" 
                                style="padding: 10px 28px; background: #0f172a; color: #fff; border: none; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;">
                            Update Password
                        </button>
                    </div>
                </form>

                <div id="changePasswordAlert" class="mt-4" style="display: none; border-radius: 8px; text-align: center; font-size: 0.875rem;"></div>
            </section>
