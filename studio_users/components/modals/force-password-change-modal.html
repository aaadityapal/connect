<div class="fpcm-overlay" id="forcePasswordChangeOverlay" style="display:none;" aria-hidden="true">
  <div class="fpcm-box" role="dialog" aria-modal="true" aria-labelledby="fpcmTitle">
    <div class="fpcm-header">
      <div>
        <h3 class="fpcm-title" id="fpcmTitle">Update your password</h3>
        <div class="fpcm-sub" id="fpcmSub">For security, you must change your password before continuing.</div>
      </div>
    </div>

    <form id="forcePasswordChangeForm" class="fpcm-form" autocomplete="off">
      <label class="fpcm-label" for="fpcmCurrent">Current password</label>
      <div class="fpcm-input-wrap">
        <input class="fpcm-input" id="fpcmCurrent" name="current_password" type="password" required />
        <button type="button" class="fpcm-icon-btn" data-target="fpcmCurrent" aria-label="Show current password" title="Show/Hide">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>

      <div class="fpcm-label-row">
        <label class="fpcm-label" for="fpcmNew">New password</label>
        <button type="button" class="fpcm-gen-btn" id="fpcmGenerateBtn" title="Generate password">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          Auto Generate
        </button>
      </div>
      <div class="fpcm-input-wrap">
        <input class="fpcm-input" id="fpcmNew" name="new_password" type="password" required />
        <button type="button" class="fpcm-icon-btn" data-target="fpcmNew" aria-label="Show new password" title="Show/Hide">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>

      <label class="fpcm-label" for="fpcmConfirm">Confirm new password</label>
      <div class="fpcm-input-wrap">
        <input class="fpcm-input" id="fpcmConfirm" name="confirm_password" type="password" required />
        <button type="button" class="fpcm-icon-btn" data-target="fpcmConfirm" aria-label="Show confirm password" title="Show/Hide">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>
      <div class="fpcm-hint">Password must be at least 8 characters, include a letter and a number, and contain no spaces.</div>

      <div class="fpcm-error" id="fpcmError" style="display:none;"></div>
      <div class="fpcm-actions">
        <button type="submit" class="fpcm-btn" id="fpcmSubmit">
          <i class="fa-solid fa-lock"></i>
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
