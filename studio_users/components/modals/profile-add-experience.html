<div class="modal-overlay" id="modal-add-experience">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title-group">
                <h3 class="modal-title">Add Work Experience</h3>
            </div>
            <div class="modal-header-right">
                <button class="modal-close">&times;</button>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-content-box form-grid grid-1">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="modal-exp-company" placeholder="Enter company name">
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="modal-exp-title" placeholder="Enter your job title">
                </div>
                <div class="form-group">
                    <label>Years of Experience</label>
                    <input type="text" id="modal-exp-years" placeholder="e.g. 2 years">
                </div>
                <div class="form-group">
                    <label>Key Responsibilities</label>
                    <textarea id="modal-exp-desc" rows="3" placeholder="Describe your key responsibilities"></textarea>
                </div>
            </div>
            <div class="form-actions mt-4 text-right">
                <button class="btn btn-primary" id="btn-save-experience-modal">Save Experience</button>
            </div>
        </div>
    </div>
</div>
