<div class="modal-overlay" id="modal-upload-photo">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title-group">
                <h3 class="modal-title">Upload Profile Picture</h3>
            </div>
            <div class="modal-header-right">
                <button class="modal-close">&times;</button>
            </div>
        </div>
        <div class="modal-body">
             <div class="modal-content-box">
                 <div class="avatar-upload-zone" id="avatar-upload-zone">
                      <input type="file" class="avatar-file-selector" id="avatar-file-selector" accept="image/*">
                      <span class="avatar-selection-status">Choose file or drag & drop</span>
                 </div>
                 <p class="sub-text text-center mt-2">Supported formats: JPG, PNG (Max 5MB)</p>
             </div>
             <div class="mt-4 text-center">
                 <button class="btn btn-primary" id="btn-commit-avatar-upload">Upload Photo</button>
             </div>
        </div>
    </div>
</div>
