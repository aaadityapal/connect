<div class="modal-overlay" id="modal-add-education">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-title-group">
                <h3 class="modal-title">Add Education Background</h3>
            </div>
            <div class="modal-header-right">
                <button class="modal-close">&times;</button>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-content-box form-grid grid-1">
                <div class="form-group full-width">
                    <label>Degree Level*</label>
                    <select id="modal-edu-level">
                        <option value="">Select Degree</option>
                        <option value="High School">High School</option>
                        <option value="Bachelor's">Bachelor's</option>
                        <option value="Master's">Master's</option>
                        <option value="Doctorate">Doctorate</option>
                        <option value="Diploma">Diploma</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Institution Name*</label>
                    <input type="text" id="modal-edu-institution" placeholder="Enter institution name">
                </div>
                <div class="form-group full-width">
                    <label>Field of Study*</label>
                    <input type="text" id="modal-edu-field" placeholder="Enter your field of study">
                </div>
                <div class="form-group full-width">
                    <label>Graduation Year*</label>
                    <input type="text" id="modal-edu-year" placeholder="e.g. 2024">
                </div>
            </div>
            <div class="form-actions mt-4 text-right">
                <button class="btn btn-primary" id="btn-save-education-modal">Save Education</button>
            </div>
        </div>
    </div>
</div>
