<div class="fpcm-overlay" id="forcePasswordChangeOverlay" style="display:none;" aria-hidden="true">
  <div class="fpcm-box" role="dialog" aria-modal="true" aria-labelledby="fpcmTitle">
    <div class="fpcm-header">
      <div>
        <h3 class="fpcm-title" id="fpcmTitle">Update your password</h3>
        <div class="fpcm-sub">For security, you must change your password before continuing.</div>
      </div>
    </div>

    <form id="forcePasswordChangeForm" class="fpcm-form" autocomplete="off">
      <label class="fpcm-label" for="fpcmCurrent">Current password</label>
      <input class="fpcm-input" id="fpcmCurrent" name="current_password" type="password" required />

      <label class="fpcm-label" for="fpcmNew">New password</label>
      <input class="fpcm-input" id="fpcmNew" name="new_password" type="password" required />

      <label class="fpcm-label" for="fpcmConfirm">Confirm new password</label>
      <input class="fpcm-input" id="fpcmConfirm" name="confirm_password" type="password" required />

      <div class="fpcm-error" id="fpcmError" style="display:none;"></div>
      <div class="fpcm-actions">
        <button type="submit" class="fpcm-btn" id="fpcmSubmit">
          <i class="fa-solid fa-lock"></i>
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
